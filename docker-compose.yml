# MyPress Docker Compose 配置
# 用法: docker compose up -d

services:
  # Web应用
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mypress_web
    restart: unless-stopped
    ports:
      - "${MYPRESS_PORT:-8000}:8000"
    environment:
      - DATABASE_URL=postgres://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
      - REDIS_URL=redis://redis:6379/0
      - DEBUG=${DEBUG:-False}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-localhost}
      - SECRET_KEY=${SECRET_KEY}
      - DJANGO_SETTINGS_MODULE=my_press.settings.production
      # 站点自定义
      - SITE_NAME=${SITE_NAME:-MyPress}
      - SITE_SUBTITLE=${SITE_SUBTITLE:-}
      - HERO_TITLE=${HERO_TITLE:-}
      - HERO_SUBTITLE=${HERO_SUBTITLE:-}
      - FOOTER_TEXT=${FOOTER_TEXT:-}
      # 超级管理员自动创建
      - SUPERUSER_USERNAME=${SUPERUSER_USERNAME:-}
      - SUPERUSER_PASSWORD=${SUPERUSER_PASSWORD:-}
      - SUPERUSER_EMAIL=${SUPERUSER_EMAIL:-}
    volumes:
      - ./data:/app/data
      - /var/www/static:/app/static
      - /var/www/media/uploads:/app/media
      - ./home:/app/home
      - ./my_press:/app/my_press
      - ./templates:/app/templates
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             python manage.py init_pages &&
             python manage.py init_superuser &&
             python manage.py runserver 0.0.0.0:8000"

  # PostgreSQL数据库
  db:
    image: postgres:15-alpine
    container_name: mypress_db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${DB_NAME:-mypress}
      - POSTGRES_USER=${DB_USER:-mypress}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-mypress}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis缓存
  redis:
    image: redis:7-alpine
    container_name: mypress_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  # Nginx反向代理 (可选，生产环境推荐)
  # nginx:
  #   image: nginx:alpine
  #   container_name: mypress_nginx
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/nginx.conf:ro
  #     - static_volume:/app/static:ro
  #   depends_on:
  #     - web

volumes:
  db_data:
  redis_data:

networks:
  default:
    name: mypress_network
