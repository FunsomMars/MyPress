{% extends "base.html" %}

{% block content %}
<div class="editor-container">
    <div class="editor-box">
        <h2>编辑文章</h2>
        
        {% if messages %}
        <div class="messages">
            {% for message in messages %}
            <div class="alert alert-{{ message.tags }}">{{ message }}</div>
            {% endfor %}
        </div>
        {% endif %}
        
        <form method="post" action="{% url 'edit_article' article.slug %}">
            {% csrf_token %}
            
            <div class="form-group">
                <label for="title">文章标题</label>
                <input type="text" id="title" name="title" value="{{ article.title }}" required autofocus>
            </div>
            
            <div class="form-group">
                <label for="intro">文章摘要</label>
                <textarea id="intro" name="intro" rows="3">{{ article.intro }}</textarea>
            </div>
            
            <div class="form-group">
                <label for="date">发布日期</label>
                <input type="date" id="date" name="date" value="{{ article.date|date:'Y-m-d' }}">
            </div>
            
            <div class="form-group">
                <label for="body">文章内容</label>
                <textarea id="body" name="body" rows="20" class="rich-editor">{{ article.body }}</textarea>
            </div>
            
            <div class="form-actions">
                <button type="submit" class="btn btn-primary">保存修改</button>
                <a href="/blog/{{ article.slug }}/" class="btn btn-secondary">取消</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
