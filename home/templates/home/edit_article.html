{% extends "base.html" %}

{% block content %}
<link href="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.snow.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<div class="editor-container">
    <div class="editor-box">
        <h2>编辑文章</h2>
        
        {% if messages %}
        <div class="messages">
            {% for message in messages %}
            <div class="alert alert-{{ message.tags }}">{{ message }}</div>
            {% endfor %}
        </div>
        {% endif %}
        
        <form method="post" action="{% url 'edit_article' article.slug %}" id="articleForm">
            {% csrf_token %}
            
            <div class="form-group">
                <label for="title">文章标题</label>
                <input type="text" id="title" name="title" value="{{ article.title }}" required autofocus>
            </div>
            
            <div class="form-group">
                <label>文章内容</label>
                <div class="editor-toggle">
                    <button type="button" class="btn active" id="btnRichText" onclick="switchEditor('richtext')">富文本</button>
                    <button type="button" class="btn" id="btnMarkdown" onclick="switchEditor('markdown')">Markdown</button>
                </div>
                
                <!-- 富文本编辑器容器 -->
                <div id="quill-editor" style="height: calc(100vh - 300px); min-height: 500px;"></div>
                
                <!-- Markdown编辑器容器 -->
                <div id="markdown-editor" style="display: none;">
                    <textarea id="markdown-body" name="body_markdown" rows="20" class="markdown-textarea" placeholder="使用Markdown语法撰写文章..."></textarea>
                    <div class="markdown-preview" id="markdown-preview" style="display: none; margin-top: 20px; padding: 20px; border: 1px solid #ddd; background: #f9f9f9;"></div>
                </div>
                
                <!-- 隐藏字段用于存储最终内容 -->
                <input type="hidden" id="body" name="body" value="{{ article.body }}">
            </div>
            
            <div class="form-actions">
                <button type="submit" class="btn btn-primary" onclick="return submitForm()">保存修改</button>
                <a href="/blog/{{ article.slug }}/" class="btn btn-secondary">取消</a>
            </div>
        </form>
    </div>
</div>

<style>
.editor-toggle { margin-bottom: 10px; display: flex; gap: 5px; }
.editor-toggle .btn { 
    padding: 8px 20px;
    background: #e0e0e0;
    color: #666;
    border: 1px solid #ccc;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.2s;
}
.editor-toggle .btn:hover { background: #d0d0d0; }
.editor-toggle .btn.active { 
    background: #667eea; 
    color: white;
    border-color: #667eea;
}
.markdown-textarea { width: 100%; min-height: calc(100vh - 400px); padding: 12px; border: 1px solid #ddd; border-radius: 5px; font-family: 'Monaco', 'Menlo', monospace; font-size: 14px; line-height: 1.6; min-height: 300px; }
.markdown-preview h1, .markdown-preview h2, .markdown-preview h3 { margin-top: 20px; margin-bottom: 10px; }
.markdown-preview p { margin-bottom: 15px; }
.markdown-preview code { background: #f0f0f0; padding: 2px 6px; border-radius: 3px; }
.markdown-preview pre { background: #f0f0f0; padding: 15px; border-radius: 5px; overflow-x: auto; }
.markdown-preview ul, .markdown-preview ol { margin-left: 20px; margin-bottom: 15px; }
.markdown-preview img { max-width: 100%; }
</style>

<script>
(function() {
    // 获取已有内容
    var existingBody = document.getElementById('body').value;
    var currentMode = 'richtext';
    
    // 初始化Quill编辑器
    var quill = new Quill('#quill-editor', {
        theme: 'snow',
        placeholder: '在这里撰写您的文章...',
        modules: {
            toolbar: [
                [{ 'header': [1, 2, 3, false] }],
                ['bold', 'italic', 'underline', 'strike'],
                ['blockquote', 'code-block'],
                [{ 'list': 'ordered'}, { 'list': 'bullet' }],
                [{ 'color': [] }, { 'background': [] }],
                ['link', 'image'],
                ['clean']
            ]
        }
    });
    
    // 转换WordPress相对URL为绝对URL
    function convertRelativeUrls(html) {
        if (!html) return html;
        var baseUrl = window.location.origin;
        // 转换相对图片URL
        html = html.replace(/src="\/(?!\/)/g, 'src="' + baseUrl + '/');
        // 转换相对链接
        html = html.replace(/href="\/(?!\/)/g, 'href="' + baseUrl + '/');
        return html;
    }
    
    // 加载已有内容到富文本编辑器
    if (existingBody) {
        quill.root.innerHTML = convertRelativeUrls(existingBody);
    }
    
    // 初始化Markdown编辑器 - 保持原始HTML内容以便在模式切换时使用
    var markdownTextarea = document.getElementById('markdown-body');
    if (existingBody) {
        // 将HTML转为简单文本（去掉标签但保留换行）
        var tempDiv = document.createElement('div');
        tempDiv.innerHTML = existingBody;
        markdownTextarea.value = tempDiv.innerText || tempDiv.textContent;
    }
    
    // 切换编辑器
    window.switchEditor = function(mode) {
        currentMode = mode;
        
        if (mode === 'richtext') {
            document.getElementById('quill-editor').style.display = 'block';
            document.getElementById('markdown-editor').style.display = 'none';
            document.getElementById('btnRichText').classList.add('active');
            document.getElementById('btnMarkdown').classList.remove('active');
        } else {
            document.getElementById('quill-editor').style.display = 'none';
            document.getElementById('markdown-editor').style.display = 'block';
            document.getElementById('btnRichText').classList.remove('active');
            document.getElementById('btnMarkdown').classList.add('active');
        }
    };
    
    // 提交表单
    window.submitForm = function() {
        var bodyField = document.getElementById('body');
        
        if (currentMode === 'richtext') {
            bodyField.value = quill.root.innerHTML;
        } else {
            var markdownText = document.getElementById('markdown-body').value;
            if (markdownText && typeof marked !== 'undefined') {
                bodyField.value = marked.parse(markdownText);
            } else {
                bodyField.value = '';
            }
        }
        
        return true;
    };
    
    // Markdown实时预览
    document.getElementById('markdown-body').addEventListener('input', function() {
        var preview = document.getElementById('markdown-preview');
        var text = this.value;
        if (text && typeof marked !== 'undefined') {
            preview.innerHTML = marked.parse(text);
            preview.style.display = 'block';
        } else {
            preview.style.display = 'none';
        }
    });
    
    // 页面加载后初始化视图
    window.onload = function() {
        switchEditor('richtext');
    };
})();
</script>
{% endblock %}
