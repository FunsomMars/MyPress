{% extends "base.html" %}

{% block content %}
{% include "home/_editor_assets.html" %}

<div class="editor-container">
    <div class="editor-box">
        <div class="editor-header">
            <h2>编辑专栏：{{ page_obj.title }}</h2>
        </div>

        {% if messages %}
        <div class="messages">
            {% for message in messages %}
            <div class="alert alert-{{ message.tags }}">{{ message }}</div>
            {% endfor %}
        </div>
        {% endif %}

        <form method="post" action="{% url 'edit_custom_page' page_obj.slug %}" id="pageForm">
            {% csrf_token %}

            <div class="form-group">
                <label for="title">页面标题</label>
                <input type="text" id="title" name="title" value="{{ page_obj.title }}" required>
            </div>

            <div class="form-group">
                <label for="intro">页面简介</label>
                <input type="text" id="intro" name="intro" value="{{ page_obj.intro }}" maxlength="250" placeholder="简短描述（最多250字）">
            </div>

            <div class="form-group">
                <label>页面内容</label>
                <textarea id="editor" name="body" style="visibility: hidden;">{{ page_obj.body }}</textarea>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary">保存修改</button>
                <a href="/{{ page_obj.slug }}/" class="btn btn-secondary">取消</a>
            </div>
        </form>
    </div>
</div>

<script>
var rawContent = document.getElementById('editor').value;
initEditor('#editor', rawContent);
</script>
{% endblock %}
