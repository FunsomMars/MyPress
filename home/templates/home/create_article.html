{% extends "base.html" %}

{% block content %}
<link href="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.snow.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<div class="editor-container">
    <div class="editor-box">
        <h2>创建新文章</h2>
        
        {% if messages %}
        <div class="messages">
            {% for message in messages %}
            <div class="alert alert-{{ message.tags }}">{{ message }}</div>
            {% endfor %}
        </div>
        {% endif %}
        
        <form method="post" action="{% url 'create_article' %}" id="articleForm">
            {% csrf_token %}
            
            <div class="form-group">
                <label for="title">文章标题</label>
                <input type="text" id="title" name="title" required autofocus>
            </div>
            
            <div class="form-group">
                <label for="intro">文章摘要</label>
                <textarea id="intro" name="intro" rows="3" placeholder="可选，默认为标题前250个字符"></textarea>
            </div>
            
            <div class="form-group">
                <label>文章内容</label>
                <div class="editor-toggle">
                    <button type="button" class="btn btn-sm btn-primary" id="btnRichText" onclick="switchEditor('richtext')">富文本</button>
                    <button type="button" class="btn btn-sm" id="btnMarkdown" onclick="switchEditor('markdown')">Markdown</button>
                </div>
                
                <!-- 富文本编辑器容器 -->
                <div id="quill-editor" style="height: 400px;"></div>
                
                <!-- Markdown编辑器容器 -->
                <div id="markdown-editor" style="display: none;">
                    <textarea id="markdown-body" name="body" rows="20" class="markdown-textarea" placeholder="使用Markdown语法撰写文章...

# 标题1
## 标题2

**粗体** *斜体*

- 列表项1
- 列表项2

[链接文本](URL)

```代码块```
"></textarea>
                    <div class="markdown-preview" id="markdown-preview" style="display: none; margin-top: 20px; padding: 20px; border: 1px solid #ddd; background: #f9f9f9;"></div>
                </div>
                
                <!-- 隐藏字段用于存储最终内容 -->
                <input type="hidden" id="body" name="body" value="">
            </div>
            
            <div class="form-actions">
                <button type="submit" class="btn btn-primary" onclick="return submitForm()">发布文章</button>
                <a href="/" class="btn btn-secondary">取消</a>
            </div>
        </form>
    </div>
</div>

<style>
.editor-toggle { margin-bottom: 10px; }
.editor-toggle .btn { margin-right: 5px; }
.editor-toggle .btn.active { background: #667eea; color: white; }
.markdown-textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 5px; font-family: 'Monaco', 'Menlo', monospace; font-size: 14px; line-height: 1.6; }
.markdown-preview h1, .markdown-preview h2, .markdown-preview h3 { margin-top: 20px; margin-bottom: 10px; }
.markdown-preview p { margin-bottom: 15px; }
.markdown-preview code { background: #f0f0f0; padding: 2px 6px; border-radius: 3px; }
.markdown-preview pre { background: #f0f0f0; padding: 15px; border-radius: 5px; overflow-x: auto; }
.markdown-preview ul, .markdown-preview ol { margin-left: 20px; margin-bottom: 15px; }
.markdown-preview img { max-width: 100%; }
</style>

<script>
// 初始化Quill编辑器
var quill = new Quill('#quill-editor', {
    theme: 'snow',
    placeholder: '在这里撰写您的文章...',
    modules: {
        toolbar: [
            [{ 'header': [1, 2, 3, false] }],
            ['bold', 'italic', 'underline', 'strike'],
            ['blockquote', 'code-block'],
            [{ 'list': 'ordered'}, { 'list': 'bullet' }],
            [{ 'color': [] }, { 'background': [] }],
            ['link', 'image'],
            ['clean']
        ]
    }
});

var currentMode = 'richtext';

function switchEditor(mode) {
    currentMode = mode;
    
    if (mode === 'richtext') {
        document.getElementById('quill-editor').style.display = 'block';
        document.getElementById('markdown-editor').style.display = 'none';
        document.getElementById('btnRichText').classList.add('active');
        document.getElementById('btnMarkdown').classList.remove('active');
    } else {
        document.getElementById('quill-editor').style.display = 'none';
        document.getElementById('markdown-editor').style.display = 'block';
        document.getElementById('btnRichText').classList.remove('active');
        document.getElementById('btnMarkdown').classList.add('active');
    }
}

function submitForm() {
    var bodyField = document.getElementById('body');
    
    if (currentMode === 'richtext') {
        // 从Quill获取HTML内容
        bodyField.value = quill.root.innerHTML;
    } else {
        // 从Markdown转换
        var markdownText = document.getElementById('markdown-body').value;
        if (markdownText) {
            bodyField.value = marked.parse(markdownText);
        } else {
            bodyField.value = '';
        }
    }
    
    return true;
}

// Markdown实时预览
document.getElementById('markdown-body').addEventListener('input', function() {
    var preview = document.getElementById('markdown-preview');
    var text = this.value;
    if (text) {
        preview.innerHTML = marked.parse(text);
        preview.style.display = 'block';
    } else {
        preview.style.display = 'none';
    }
});

// 初始化按钮状态
document.getElementById('btnRichText').classList.add('active');
</script>
{% endblock %}
