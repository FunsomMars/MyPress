{% extends "base.html" %}

{% block content %}
{% include "home/_editor_assets.html" %}

<div class="editor-container">
    <div class="editor-box">
        <div class="editor-header">
            <h2>创建新文章</h2>
        </div>

        {% if messages %}
        <div class="messages">
            {% for message in messages %}
            <div class="alert alert-{{ message.tags }}">{{ message }}</div>
            {% endfor %}
        </div>
        {% endif %}

        <form method="post" action="{% url 'create_article' %}" id="articleForm">
            {% csrf_token %}

            <div class="form-group">
                <label for="title">文章标题</label>
                <input type="text" id="title" name="title" required autofocus placeholder="输入文章标题...">
            </div>

            <div class="form-group">
                <label>文章内容</label>
                <textarea id="editor" name="body" style="visibility: hidden;"></textarea>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary">发布文章</button>
                <a href="/" class="btn btn-secondary">取消</a>
            </div>
        </form>
    </div>
</div>

<script>
initEditor('#editor');
</script>
{% endblock %}
